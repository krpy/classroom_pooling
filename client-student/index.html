<!DOCTYPE html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Anketa</title>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --card: #111827;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --accent2: #a78bfa;
        --danger: #f87171;
        --ok: #4ade80;
        --border: #1f2937;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: system-ui, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        padding: 16px;
        padding-bottom: max(24px, env(safe-area-inset-bottom));
      }
      h1 {
        font-size: 1.35rem;
        margin: 0 0 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        max-width: 640px;
        margin: 0 auto;
      }
      label {
        display: block;
        font-size: 0.95rem;
        color: var(--muted);
        margin-bottom: 8px;
      }
      input[type="text"],
      input[type="number"] {
        width: 100%;
        font-size: 1.25rem;
        padding: 14px 16px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #0f172a;
        color: var(--text);
      }
      button {
        width: 100%;
        margin-top: 14px;
        padding: 16px 18px;
        font-size: 1.1rem;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #0b1220;
        font-weight: 700;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .muted {
        color: var(--muted);
        font-size: 0.95rem;
        line-height: 1.5;
      }
      .banner {
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 0.95rem;
        margin-bottom: 12px;
      }
      .banner.err {
        background: rgba(248, 113, 113, 0.12);
        color: var(--danger);
        border: 1px solid rgba(248, 113, 113, 0.35);
      }
      .banner.ok {
        background: rgba(74, 222, 128, 0.12);
        color: var(--ok);
        border: 1px solid rgba(74, 222, 128, 0.35);
      }
      .q-title {
        font-size: 1.1rem;
        line-height: 1.45;
        margin: 0 0 16px;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border);
      }
      .row:last-child {
        border-bottom: none;
      }
      .row span {
        flex: 1;
        font-size: 1rem;
      }
      .pct {
        width: 88px;
        font-size: 1.1rem;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: #0f172a;
        color: var(--text);
        text-align: center;
      }
      .sum {
        margin-top: 10px;
        font-weight: 700;
      }
      .sum.bad {
        color: var(--danger);
      }
      .sum.good {
        color: var(--ok);
      }
      #rankList {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      #rankList li {
        padding: 16px 14px;
        margin-bottom: 10px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #0f172a;
        font-size: 1.05rem;
        touch-action: none;
        user-select: none;
      }
      .rank-line {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .rank-controls {
        display: flex;
        gap: 6px;
      }
      .rank-controls button {
        width: auto;
        margin: 0;
        font-size: 0.9rem;
        border-radius: 10px;
        padding: 8px 10px;
        background: #1e293b;
        color: #e2e8f0;
      }
      #rankList li.sortable-ghost {
        opacity: 0.45;
      }
      .mc-opt {
        display: block;
        margin: 10px 0;
        padding: 16px 14px;
        border-radius: 14px;
        border: 1px solid var(--border);
        background: #0f172a;
        font-size: 1.05rem;
      }
      .mc-opt input {
        width: auto;
        margin-right: 10px;
        transform: scale(1.2);
      }
      .bar {
        margin: 10px 0;
      }
      .bar .lab {
        font-size: 0.9rem;
        color: var(--muted);
        margin-bottom: 4px;
      }
      .bar .track {
        height: 14px;
        border-radius: 999px;
        background: #0f172a;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .bar .fill {
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
      }
      .pie-row {
        display: flex;
        justify-content: space-between;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
        font-size: 0.98rem;
      }
      .reading-doc h1,
      .reading-doc h2,
      .reading-doc h3 {
        line-height: 1.3;
        margin: 16px 0 8px;
      }
      .reading-doc p,
      .reading-doc li {
        line-height: 1.55;
      }
      #askBox {
        margin-top: 16px;
        padding-top: 14px;
        border-top: 1px solid var(--border);
      }
      #askText {
        width: 100%;
        min-height: 80px;
        font-size: 1rem;
        padding: 10px 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #0f172a;
        color: var(--text);
      }
      #askBtn {
        margin-top: 10px;
      }
      .yn-row {
        display: flex;
        gap: 12px;
        margin-top: 8px;
      }
      .yn-row button {
        flex: 1;
        margin-top: 0;
      }
      .rank-justify {
        width: 100%;
        min-height: 100px;
        font-size: 1rem;
        padding: 10px 12px;
        margin-top: 12px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: #0f172a;
        color: var(--text);
        resize: vertical;
      }
      .rank-justify-hint {
        margin-top: 8px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="card" id="app">
      <div id="screen-pin">
        <h1>Připojení</h1>
        <p class="muted">Zadej čtyřmístný PIN od lektora.</p>
        <label for="pinInput">PIN</label>
        <input id="pinInput" type="text" inputmode="numeric" maxlength="4" autocomplete="one-time-code" />
        <button type="button" id="btnJoin">Připojit se</button>
      </div>
      <div id="screen-wait" hidden>
        <h1>Čekej na otázku…</h1>
        <p class="muted">Jakmile lektor spustí otázku, zobrazí se ti tady.</p>
      </div>
      <div id="screen-q" hidden></div>
      <div id="screen-reading" hidden></div>
      <div id="screen-sent" hidden>
        <h1>Odpověď odeslána</h1>
        <p class="muted">Čekej na výsledky.</p>
      </div>
      <div id="screen-results" hidden></div>
      <div id="askBox" hidden>
        <label for="askText">Máš dotaz na lektora?</label>
        <textarea id="askText" maxlength="1000" placeholder="Napiš svůj dotaz..."></textarea>
        <button type="button" id="askBtn">Odeslat dotaz</button>
      </div>
      <div id="banner"></div>
    </div>
    <script>
      (function () {
        const TOKEN_KEY = "cp_student_token";
        const PIN_KEY = "cp_last_pin";
        function makeUuidFallback() {
          const tpl = "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx";
          return tpl.replace(/[xy]/g, function (c) {
            const r = (Math.random() * 16) | 0;
            const v = c === "x" ? r : (r & 0x3) | 0x8;
            return v.toString(16);
          });
        }
        function studentToken() {
          let t = localStorage.getItem(TOKEN_KEY);
          if (!t) {
            t =
              window.crypto && typeof window.crypto.randomUUID === "function"
                ? window.crypto.randomUUID()
                : makeUuidFallback();
            localStorage.setItem(TOKEN_KEY, t);
          }
          return t;
        }
        const params = new URLSearchParams(location.search);
        const initialPin =
          (params.get("pin") || localStorage.getItem(PIN_KEY) || "")
            .replace(/\D/g, "")
            .slice(0, 4);

        const el = {
          pin: document.getElementById("pinInput"),
          btnJoin: document.getElementById("btnJoin"),
          screenPin: document.getElementById("screen-pin"),
          screenWait: document.getElementById("screen-wait"),
          screenQ: document.getElementById("screen-q"),
          screenReading: document.getElementById("screen-reading"),
          screenSent: document.getElementById("screen-sent"),
          screenResults: document.getElementById("screen-results"),
          askBox: document.getElementById("askBox"),
          askText: document.getElementById("askText"),
          askBtn: document.getElementById("askBtn"),
          banner: document.getElementById("banner"),
        };

        if (initialPin.length === 4) el.pin.value = initialPin;

        let ws = null;
        let joined = false;
        let currentQuestion = null;
        let sortable = null;
        let lastPin = initialPin;
        let reconnectTimer = null;

        function showBanner(text, kind) {
          if (!text) {
            el.banner.innerHTML = "";
            el.banner.className = "";
            return;
          }
          el.banner.innerHTML = '<div class="banner ' + (kind || "") + '">' + text + "</div>";
        }

        function setScreens(name) {
          el.screenPin.hidden = name !== "pin";
          el.screenWait.hidden = name !== "wait";
          el.screenQ.hidden = name !== "q";
          el.screenReading.hidden = name !== "reading";
          el.screenSent.hidden = name !== "sent";
          el.screenResults.hidden = name !== "results";
          el.askBox.hidden = name === "pin";
        }

        function wsUrl() {
          const p = location.protocol === "https:" ? "wss:" : "ws:";
          return p + "//" + location.host + "/ws";
        }

        function connect(pin) {
          if (reconnectTimer) {
            clearTimeout(reconnectTimer);
            reconnectTimer = null;
          }
          lastPin = pin;
          localStorage.setItem(PIN_KEY, pin);
          if (ws) ws.close();
          ws = new WebSocket(wsUrl());
          ws.onopen = function () {
            ws.send(
              JSON.stringify({
                type: "join",
                pin: pin,
                studentToken: studentToken(),
              })
            );
          };
          ws.onmessage = function (ev) {
            var msg;
            try {
              msg = JSON.parse(ev.data);
            } catch (_e) {
              showBanner("Neplatná odpověď serveru.", "err");
              return;
            }
            if (msg.type === "error") {
              showBanner(msg.message || "Chyba", "err");
              joined = false;
              setScreens("pin");
              return;
            }
            showBanner("");
            if (msg.type === "waiting") {
              joined = true;
              currentQuestion = null;
              destroySortable();
              setScreens("wait");
            }
            if (msg.type === "question_activated") {
              joined = true;
              currentQuestion = msg.question;
              renderQuestion(msg.question);
              setScreens("q");
            }
            if (msg.type === "question_closed") {
              currentQuestion = null;
              destroySortable();
              setScreens("wait");
            }
            if (msg.type === "show_results") {
              destroySortable();
              renderResults(msg.results);
              setScreens("results");
            }
            if (msg.type === "reading_activated") {
              destroySortable();
              renderReading(msg.reading);
              setScreens("reading");
            }
            if (msg.type === "question_saved") {
              el.askText.value = "";
              showBanner("Dotaz byl odeslán.", "ok");
            }
          };
          ws.onclose = function () {
            if (joined && lastPin) {
              showBanner("Spojení přerušeno, obnovuji…", "err");
              reconnectTimer = setTimeout(function () {
                connect(lastPin);
              }, 1000);
              return;
            }
            joined = false;
          };
        }

        function safeWsSend(payload) {
          if (!ws || ws.readyState !== 1) {
            showBanner("Spojení není aktivní. Zkus to znovu.", "err");
            setScreens("wait");
            return false;
          }
          ws.send(JSON.stringify(payload));
          return true;
        }

        function destroySortable() {
          if (sortable) {
            sortable.destroy();
            sortable = null;
          }
        }

        function renderQuestion(q) {
          el.screenQ.innerHTML = "";
          var title = document.createElement("p");
          title.className = "q-title";
          title.textContent = q.text;
          el.screenQ.appendChild(title);

          if (q.type === "slider") {
            var items = (q.options && q.options.items) || [];
            var wrap = document.createElement("div");
            var inputs = [];
            items.forEach(function (label, i) {
              var row = document.createElement("div");
              row.className = "row";
              var span = document.createElement("span");
              span.textContent = label;
              var inp = document.createElement("input");
              inp.type = "number";
              inp.min = "0";
              inp.max = "100";
              inp.step = "1";
              inp.className = "pct";
              inp.value = String(Math.round(100 / items.length));
              inp.dataset.idx = String(i);
              inputs.push(inp);
              row.appendChild(span);
              row.appendChild(inp);
              wrap.appendChild(row);
            });
            var sumEl = document.createElement("div");
            sumEl.className = "sum";
            var btn = document.createElement("button");
            btn.type = "button";
            btn.textContent = "Odeslat";
            function recalc() {
              var s = 0;
              inputs.forEach(function (x) {
                s += Number(x.value) || 0;
              });
              sumEl.textContent = "Součet: " + s + " % (musí být 100 %)";
              sumEl.className = "sum " + (Math.abs(s - 100) < 0.51 ? "good" : "bad");
              btn.disabled = Math.abs(s - 100) >= 0.51;
            }
            inputs.forEach(function (inp) {
              inp.addEventListener("input", recalc);
            });
            el.screenQ.appendChild(wrap);
            el.screenQ.appendChild(sumEl);
            btn.addEventListener("click", function () {
              var p = inputs.map(function (i) {
                return Number(i.value) || 0;
              });
              if (
                safeWsSend({
                  type: "submit",
                  questionId: q.id,
                  studentToken: studentToken(),
                  value: { percentages: p },
                })
              ) {
                setScreens("sent");
              }
            });
            el.screenQ.appendChild(btn);
            recalc();
            return;
          }

          if (q.type === "ranking") {
            var items = (q.options && q.options.items) || [];
            var ul = document.createElement("ul");
            ul.id = "rankList";
            items.forEach(function (text, idx) {
              var li = document.createElement("li");
              li.dataset.id = String(idx);
              var line = document.createElement("div");
              line.className = "rank-line";
              var label = document.createElement("span");
              label.textContent = text;
              line.appendChild(label);
              li.appendChild(line);
              ul.appendChild(li);
            });
            el.screenQ.appendChild(ul);
            if (window.Sortable && typeof window.Sortable.create === "function") {
              sortable = window.Sortable.create(ul, {
                animation: 150,
                handle: "li",
              });
            }
            if (!sortable) {
              Array.from(ul.children).forEach(function (item) {
                var controls = document.createElement("div");
                controls.className = "rank-controls";
                var up = document.createElement("button");
                up.type = "button";
                up.textContent = "Nahoru";
                var down = document.createElement("button");
                down.type = "button";
                down.textContent = "Dolů";
                up.addEventListener("click", function () {
                  var prev = item.previousElementSibling;
                  if (prev) ul.insertBefore(item, prev);
                });
                down.addEventListener("click", function () {
                  var next = item.nextElementSibling;
                  if (next) ul.insertBefore(next, item);
                });
                controls.appendChild(up);
                controls.appendChild(down);
                item.firstChild.appendChild(controls);
              });
            }
            var labJ = document.createElement("label");
            labJ.setAttribute("for", "rankJustification");
            labJ.className = "muted";
            labJ.style.display = "block";
            labJ.style.marginTop = "14px";
            labJ.textContent = "Odůvodnění pořadí (ekonomický pohled, min. 20 znaků)";
            el.screenQ.appendChild(labJ);
            var taJ = document.createElement("textarea");
            taJ.id = "rankJustification";
            taJ.className = "rank-justify";
            taJ.maxLength = 2000;
            taJ.placeholder =
              "Např. proč jsi dal nejdůležitější první faktor, jaké náklady nebo rizika tím řešíš…";
            el.screenQ.appendChild(taJ);
            var hintJ = document.createElement("p");
            hintJ.className = "muted rank-justify-hint";
            hintJ.id = "rankJustHint";
            hintJ.textContent = "";
            el.screenQ.appendChild(hintJ);
            var btn2 = document.createElement("button");
            btn2.type = "button";
            btn2.textContent = "Odeslat pořadí a odůvodnění";
            function rankJustOk() {
              return (taJ.value || "").trim().length >= 20;
            }
            function refreshRankBtn() {
              var ok = rankJustOk();
              btn2.disabled = !ok;
              hintJ.textContent = ok
                ? ""
                : "Ještě doplň odůvodnění (alespoň 20 znaků), aby šlo odeslat.";
            }
            taJ.addEventListener("input", refreshRankBtn);
            refreshRankBtn();
            btn2.addEventListener("click", function () {
              var order;
              if (sortable) {
                order = sortable.toArray().map(function (x) {
                  return Number(x);
                });
              } else {
                order = Array.from(ul.children).map(function (node) {
                  return Number(node.dataset.id);
                });
              }
              var just = (taJ.value || "").trim();
              if (just.length < 20) {
                showBanner("Doplň odůvodnění pořadí (min. 20 znaků).", "err");
                return;
              }
              if (
                safeWsSend({
                  type: "submit",
                  questionId: q.id,
                  studentToken: studentToken(),
                  value: { order: order, justification: just },
                })
              ) {
                setScreens("sent");
              }
            });
            el.screenQ.appendChild(btn2);
            if (!sortable) {
              var hint = document.createElement("p");
              hint.className = "muted";
              hint.textContent =
                "V Safari může být blokovaná knihovna pro drag&drop. Použij tlačítka Nahoru / Dolů.";
              el.screenQ.appendChild(hint);
            }
            return;
          }

          if (q.type === "number_guess") {
            var nMin = Number((q.options && q.options.min) ?? 0);
            var nMax = Number((q.options && q.options.max) ?? 100);
            var inpN = document.createElement("input");
            inpN.type = "number";
            inpN.min = String(nMin);
            inpN.max = String(nMax);
            inpN.step = "1";
            inpN.className = "pct";
            inpN.style.width = "100%";
            inpN.style.marginTop = "8px";
            inpN.value = String(Math.min(nMax, Math.max(nMin, Math.round((nMin + nMax) / 2))));
            var hintN = document.createElement("p");
            hintN.className = "muted";
            hintN.textContent = "Zadej celé číslo od " + nMin + " do " + nMax + ".";
            el.screenQ.appendChild(hintN);
            el.screenQ.appendChild(inpN);
            var btnN = document.createElement("button");
            btnN.type = "button";
            btnN.textContent = "Odeslat tip";
            btnN.addEventListener("click", function () {
              var g = Math.trunc(Number(inpN.value));
              if (
                safeWsSend({
                  type: "submit",
                  questionId: q.id,
                  studentToken: studentToken(),
                  value: { guess: g },
                })
              ) {
                setScreens("sent");
              }
            });
            el.screenQ.appendChild(btnN);
            return;
          }

          if (q.type === "multiple_choice") {
            var choices = (q.options && q.options.choices) || [];
            var yesNo = q.options && q.options.yesNoLayout === true;
            if (yesNo && choices.length === 2) {
              var rowYn = document.createElement("div");
              rowYn.className = "yn-row";
              var sendChoice = function (idx) {
                if (
                  safeWsSend({
                    type: "submit",
                    questionId: q.id,
                    studentToken: studentToken(),
                    value: { choice: idx },
                  })
                ) {
                  setScreens("sent");
                }
              };
              var b0 = document.createElement("button");
              b0.type = "button";
              b0.textContent = choices[0];
              b0.addEventListener("click", function () {
                sendChoice(0);
              });
              var b1 = document.createElement("button");
              b1.type = "button";
              b1.textContent = choices[1];
              b1.addEventListener("click", function () {
                sendChoice(1);
              });
              rowYn.appendChild(b0);
              rowYn.appendChild(b1);
              el.screenQ.appendChild(rowYn);
              return;
            }

            var picked = 0;
            var fieldset = document.createElement("div");
            choices.forEach(function (c, idx) {
              var lab = document.createElement("label");
              lab.className = "mc-opt";
              var radio = document.createElement("input");
              radio.type = "radio";
              radio.name = "mc";
              radio.value = String(idx);
              if (idx === 0) {
                radio.checked = true;
                picked = 0;
              }
              radio.addEventListener("change", function () {
                picked = idx;
              });
              lab.appendChild(radio);
              lab.appendChild(document.createTextNode(" " + c));
              fieldset.appendChild(lab);
            });
            el.screenQ.appendChild(fieldset);
            var btn3 = document.createElement("button");
            btn3.type = "button";
            btn3.textContent = "Odeslat odpověď";
            btn3.addEventListener("click", function () {
              var sel = fieldset.querySelector('input[name="mc"]:checked');
              var choice = sel ? Number(sel.value) : 0;
              if (
                safeWsSend({
                  type: "submit",
                  questionId: q.id,
                  studentToken: studentToken(),
                  value: { choice: choice },
                })
              ) {
                setScreens("sent");
              }
            });
            el.screenQ.appendChild(btn3);
          }
        }

        function renderResults(r) {
          el.screenResults.innerHTML = "";
          var h = document.createElement("h1");
          h.textContent = "Výsledky";
          el.screenResults.appendChild(h);

          if (!r || r.kind === "unknown") {
            el.screenResults.appendChild(document.createTextNode("Žádná data."));
            return;
          }

          if (r.kind === "slider") {
            r.labels.forEach(function (lab, i) {
              var avg = r.averages[i] || 0;
              var row = document.createElement("div");
              row.className = "bar";
              var l = document.createElement("div");
              l.className = "lab";
              l.textContent = lab + " — průměr " + avg + " %";
              var track = document.createElement("div");
              track.className = "track";
              var fill = document.createElement("div");
              fill.className = "fill";
              fill.style.width = Math.min(100, avg) + "%";
              track.appendChild(fill);
              row.appendChild(l);
              row.appendChild(track);
              el.screenResults.appendChild(row);
            });
          } else if (r.kind === "ranking") {
            (r.items || []).forEach(function (row) {
              var d = document.createElement("div");
              d.className = "pie-row";
              d.textContent = row.label + " — prům. pořadí " + row.avgRank;
              el.screenResults.appendChild(d);
            });
          } else if (r.kind === "number_guess") {
            (r.buckets || []).forEach(function (b) {
              var row = document.createElement("div");
              row.className = "pie-row";
              row.textContent = "Hodnota " + b.value + ": " + b.count + "×";
              el.screenResults.appendChild(row);
            });
            if (r.average != null) {
              var av = document.createElement("p");
              av.className = "muted";
              av.textContent = "Průměr: " + r.average;
              el.screenResults.appendChild(av);
            }
          } else if (r.kind === "multiple_choice") {
            var total = r.counts.reduce(function (a, b) {
              return a + b;
            }, 0);
            r.labels.forEach(function (lab, i) {
              var cnt = r.counts[i] || 0;
              var pct = total ? Math.round((cnt / total) * 100) : 0;
              var row = document.createElement("div");
              row.className = "bar";
              var l = document.createElement("div");
              l.className = "lab";
              l.textContent = lab + " — " + cnt + " hlasů (" + pct + "%)";
              var track = document.createElement("div");
              track.className = "track";
              var fill = document.createElement("div");
              fill.className = "fill";
              fill.style.width = pct + "%";
              track.appendChild(fill);
              row.appendChild(l);
              row.appendChild(track);
              el.screenResults.appendChild(row);
            });
          }
          var foot = document.createElement("p");
          foot.className = "muted";
          foot.style.marginTop = "14px";
          foot.textContent = "Počet odpovědí: " + (r.responseCount || 0);
          el.screenResults.appendChild(foot);
        }

        function renderReading(reading) {
          el.screenReading.innerHTML = "";
          var h = document.createElement("h1");
          h.textContent = reading && reading.title ? reading.title : "Reading";
          el.screenReading.appendChild(h);
          var body = document.createElement("div");
          body.className = "reading-doc";
          body.innerHTML = reading && reading.html ? reading.html : "<p>Text není dostupný.</p>";
          el.screenReading.appendChild(body);
        }

        el.btnJoin.addEventListener("click", function () {
          var pin = (el.pin.value || "").replace(/\D/g, "").slice(0, 4);
          if (pin.length !== 4) {
            showBanner("Zadej platný čtyřmístný PIN.", "err");
            return;
          }
          showBanner("Připojuji…", "ok");
          connect(pin);
        });

        el.askBtn.addEventListener("click", function () {
          var text = (el.askText.value || "").trim();
          if (!text) {
            showBanner("Napiš dotaz, prosím.", "err");
            return;
          }
          safeWsSend({ type: "ask_question", text: text });
        });

        if (initialPin.length === 4) {
          showBanner("Obnovuji připojení…", "ok");
          connect(initialPin);
        }
      })();
    </script>
  </body>
</html>
